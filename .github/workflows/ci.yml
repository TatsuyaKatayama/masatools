name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Run SDK tests
      run: uv run pytest tests/sdk/

    - name: Run Integration tests
      # Note: This assumes masabbs is in the sibling directory.
      # In a real CI, you'd need to checkout the sibling repo.
      run: uv run pytest -s tests/integration/
