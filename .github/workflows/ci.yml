name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout masatools
      uses: actions/checkout@v6
      with:
        path: masatools

    - name: Checkout masabbs
      uses: actions/checkout@v6
      with:
        repository: TatsuyaKatayama/masabbs
        path: masabbs

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        cd masatools
        uv sync

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'masabbs/go.mod'
        cache-dependency-path: 'masabbs/go.sum'

    - name: Run SDK tests
      run: |
        cd masatools
        uv run pytest tests/sdk/

    - name: Run Integration tests
      env:
        MASABBS_PATH: ${{ github.workspace }}/masabbs
      run: |
        cd masatools
        uv run pytest -s tests/integration/
